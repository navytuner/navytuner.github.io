---
layout: default
---
<div class="site-content">
  <article class="post-article">
    <header class="post-header">
      {% if page.categories.size > 0 %}
        <div class="post-header-category">{{ page.categories | first }}</div>
      {% endif %}
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
      </div>
      {% if page.tags.size > 0 %}
        <div class="post-tags">
          {% for tag in page.tags %}
            <span class="tag">{{ tag }}</span>
          {% endfor %}
        </div>
      {% endif %}
    </header>
    <div class="post-content">
      {{ content }}
    </div>
    <a href="{{ '/blog' | relative_url }}" class="back-link">&larr; Back to blog</a>
  </article>
</div>
